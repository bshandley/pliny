services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pliny
      POSTGRES_USER: pliny
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pliny_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliny -d pliny"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    image: ghcr.io/bshandley/pliny-server:latest
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pliny
      DB_USER: pliny
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DATABASE_URL: postgres://pliny:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/pliny
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 3001
      CLIENT_URL: ${PLINY_URL:?PLINY_URL must be set}
      SERVER_URL: ${PLINY_URL:?PLINY_URL must be set}
      # Optional
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: ghcr.io/bshandley/pliny-client:latest
    ports:
      - "${PLINY_PORT:-80}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pliny_pgdata:
